<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>Form</legend>
        <label for="username">Username</label><br />
        <input id="username" type="text" /><br />
        <label for="password">Password</label><br />
        <input id="password" type="password" /><br /><br />
        <input type="reset" value="Reset Form" />
      </fieldset>

      <fieldset id="game">
        <legend>Available Games</legend>
        <input type="radio" value="RL" name="game" checked /> Rocket League
        <input type="radio" value="Val" name="game" /> Valorant
        <input type="radio" value="Fort" name="game" /> Fortnite
      </fieldset>

      <fieldset id="food">
        <legend>Our Foods</legend>
        <input type="radio" value="Toast" name="food" /> Toast
        <input type="radio" value="Chick-Nugg" name="food" /> Chicken Nugget
        <input type="radio" value="French-Fries" name="food" /> French Fries
      </fieldset>
      <button type="submit">Games</button>
    </form>
  </body>
</html>
